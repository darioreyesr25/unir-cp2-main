---
# Push MkDocs image
- name: Validate ACR login server
  assert:
    that:
      - acr_login_server is defined
      - acr_login_server | length > 0
      - acr_login_server is match('^[a-z0-9][a-z0-9\-]*\\.azurecr\\.io$')
    fail_msg: "ACR login server is invalid ({{ acr_login_server }}). Set ACR_NAME or ACR_LOGIN_SERVER and re-run."

- name: Tag MkDocs image for ACR
  command: >
    podman tag {{ image_name_docs }}:{{ image_tag_docs }} 
    {{ acr_login_server }}/{{ image_name_docs }}:{{ image_tag_docs }}

- name: Push MkDocs image to ACR from the VM
  command: >
    podman push {{ acr_login_server }}/{{ image_name_docs }}:{{ image_tag_docs }}
  