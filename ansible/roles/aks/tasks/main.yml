---
- name: Gather AKS/VM hostnames from inventory (fallback for localhost runs)
  set_fact:
    # Safe selection of the first AKS host or 'localhost' as fallback
    _aks_host: "{{ (groups['azure_aks'] | default([]) | first) | default('localhost') }}"
    _vm_host: "{{ (groups['azure_vm'] | default([]) | first) | default('localhost') }}"

- name: Gather configuration values from inventory / environment
  set_fact:
    aks_resource_group: "{{ aks_resource_group | default(hostvars[_aks_host].aks_resource_group | default('rg-cnd-cp2-dev')) }}"
    aks_cluster_name: "{{ aks_cluster_name | default(hostvars[_aks_host].aks_name | default(_aks_host)) }}"
    acr_name: "{{ acr_name | default(hostvars[_vm_host].acr_name | default(lookup('env','ACR_NAME') | default('acrcndcp2dev'))) }}"
    acr_username: "{{ acr_username | default(hostvars[_vm_host].acr_username | default(lookup('env','ACR_USERNAME') | default('acrcndcp2dev'))) }}"
    acr_password: "{{ acr_password | default(hostvars[_vm_host].acr_password | default(lookup('env','ACR_PASSWORD') | default(''))) }}"

- name: Gather facts about the system
  setup:

- name: Check if kubectl exists
  stat:
    path: /usr/local/bin/kubectl
  register: kubectl_stat

- name: Determine latest stable kubectl version
  uri:
    url: https://dl.k8s.io/release/stable.txt
    return_content: yes
  register: kubectl_version
  when: not kubectl_stat.stat.exists

- name: Download kubectl binary
  get_url:
    url: "https://dl.k8s.io/release/{{ kubectl_version.content | trim }}/bin/linux/amd64/kubectl"
    dest: /usr/local/bin/kubectl
    mode: '0755'
  become: true
  when: not kubectl_stat.stat.exists

- name: Ensure kubectl is configured for AKS
  command: az aks get-credentials -g "{{ aks_resource_group }}" -n "{{ aks_cluster_name }}" --overwrite-existing

- name: Create Kubernetes Namespace
  import_tasks: namespace.yml

- name: Create ACR Secret in Kubernetes
  import_tasks: acr_auth.yml

- name: Apply PersistentVolumeClaim
  import_tasks: pvc.yml

- name: Deploy Application
  import_tasks: deploy.yml

- name: Create LoadBalancer Service
  import_tasks: service.yml
